  if (sec === 'tips') {
    const hasTips = fd.shift.tips.amount !== null;
    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row">
            <h2 class="section-title">Tips &amp; Earnings</h2>
            ${sectionStatus('tips')}
          </div>
        </div>
      </div>
      <div class="card form-card">
        <div class="form-group">
          <label class="form-label">Total Tips</label>
          <div class="input-wrap form-input-prefix">
            <span class="prefix-sym">$</span>
            <input type="number" class="form-input form-input-lg" value="${hasTips ? fd.shift.tips.amount : ''}" oninput="updateTips(this.value, false)" onblur="commitFormInput()" placeholder="">
          </div>
        </div>
        <div>
          <div class="pools-header" style="margin-bottom:10px;">
            <label class="form-label">Tip Pool Breakdown</label>
            <button class="btn-link" onclick="addPool()">+ Add Pool</button>
          </div>
          ${fd.shift.tips.pools.map((p,i) => {
            const pct2 = hasTips && fd.shift.tips.amount > 0 ? Math.round((p.amount / fd.shift.tips.amount) * 100) : 0;
            return `<div class="card pool-card" style="margin-bottom:8px;">
              <div class="pool-grid">
                <div class="form-group">
                  <input type="text" class="form-input" value="${p.name}" oninput="updatePool(${i},'name',this.value, false)" onblur="commitFormInput()" placeholder="">
                </div>
                <div class="form-group form-input-prefix" style="position:relative">
                  <span class="prefix-sym" style="top:50%;transform:translateY(-50%);">$</span>
                  <input type="number" class="form-input" style="padding-left:22px" value="${p.amount}" oninput="updatePool(${i},'amount',parseFloat(this.value)||0, false)" onblur="commitFormInput()" placeholder="">
                </div>
                <div style="display:flex;align-items:center;">
                  <button class="btn-danger" onclick="removePool(${i})">×</button>
                </div>
              </div>
              <div class="pool-bar"><div class="pool-fill" style="width:${pct2}%"></div></div>
              <div style="font-size:0.68rem;color:var(--gray-600);margin-top:3px;">${pct2}% of total</div>
            </div>`;
          }).join('')}
          ${fd.shift.tips.pools.length > 0 && hasTips ? `
            <div style="font-size:0.75rem;color:var(--gray-500);padding:4px 2px;">
              Pool total: <strong style="color:${poolTotal()===fd.shift.tips.amount?'var(--emerald-400)':'var(--amber-400)'}">${poolTotal() === fd.shift.tips.amount ? '✓ Balanced' : '$'+poolTotal()+' of $'+fd.shift.tips.amount}</strong>
            </div>` : ''}
        </div>
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Wage ${svg('chevR')}</button>
      </div>
    </div>`;
  }

  if (sec === 'wage') {
    const w = fd.shift.wage;
    const mainStart = fd.shift.times.start;
    const mainEnd = fd.shift.times.end;
    const effectiveStart = w.startTime || mainStart;
    const effectiveEnd = w.endTime || mainEnd;
    const wDur = calcDuration(effectiveStart, effectiveEnd);
    const wDurDisplay = wDur !== null ? wDur.toFixed(1) : null;
    const wStartH24 = effectiveStart ? parseInt(effectiveStart.split(':')[0]) : null;
    const wEarnings = wDur !== null && w.hourlyRate ? (w.hourlyRate * wDur).toFixed(2) : null;

    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row">
            <h2 class="section-title">Wage</h2>
            ${sectionStatus('wage')}
          </div>
        </div>
      </div>
      <div class="card form-card">
        <div>
          <div class="wage-sub-label">Hours Worked</div>
          <div class="form-grid" style="margin-bottom:12px;">
            ${renderSmartTimeField({ id: 'wage-start', label: 'Wage Start', value: effectiveStart, required: false, isEnd: false })}
            ${renderSmartTimeField({ id: 'wage-end', label: 'Wage End', value: effectiveEnd, required: false, isEnd: true, startValue: wStartH24 })}
          </div>
          ${wDurDisplay ? `
            <div class="duration-bar" style="border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.05)">
              <div class="duration-left">
                <div class="duration-dot" style="background:var(--emerald-400)"></div>
                <div>
                  <div class="duration-label">Wage Hours</div>
                  <div class="duration-note">${formatTimeDisplay(effectiveStart) || '?'} → ${formatTimeDisplay(effectiveEnd) || '?'}</div>
                </div>
              </div>
              <div class="duration-val" style="background:linear-gradient(135deg,var(--emerald-400),#10b981);-webkit-background-clip:text">${wDurDisplay} hrs</div>
            </div>` : `
            <div class="duration-bar" style="border-color:rgba(75,85,99,.2);background:rgba(75,85,99,.05);opacity:0.5">
              <div class="duration-left">
                <div class="duration-dot" style="background:var(--gray-600)"></div>
                <div>
                  <div class="duration-label">Wage Hours</div>
                  <div class="duration-note">Set both times to calculate</div>
                </div>
              </div>
              <div class="duration-val" style="-webkit-text-fill-color:var(--gray-600)">—</div>
            </div>`}
        </div>
        <div>
          <div class="wage-sub-label">Hourly Rate</div>
          <div class="form-group" style="max-width:200px;">
            <label class="form-label">Rate per Hour</label>
            <div class="input-wrap form-input-prefix" style="position:relative">
              <span class="prefix-sym">$</span>
              <input type="number" class="form-input" style="padding-left:22px;font-size:1.1rem;font-weight:700;" value="${w.hourlyRate !== null ? w.hourlyRate : ''}" oninput="updateWageRate(parseFloat(this.value)||null, false)" onblur="commitFormInput()" placeholder="" step="0.25">
            </div>
            <span style="font-size:0.7rem;color:var(--gray-600)">Seeded to $6.00</span>
          </div>
        </div>
        ${wEarnings ? `
          <div class="duration-bar" style="border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">
            <div class="duration-left">
              <div class="duration-dot" style="background:var(--emerald-400)"></div>
              <div>
                <div class="duration-label">Wage Earnings</div>
                <div class="duration-note">$${w.hourlyRate}/hr × ${wDurDisplay} hrs</div>
              </div>
            </div>
            <div class="duration-val" style="background:linear-gradient(135deg,var(--emerald-400),#10b981);-webkit-background-clip:text">$${wEarnings}</div>
          </div>` : `
          <div class="duration-bar" style="border-color:rgba(75,85,99,.15);background:rgba(75,85,99,.04);opacity:0.5">
            <div class="duration-left">
              <div class="duration-dot" style="background:var(--gray-600)"></div>
              <div>
                <div class="duration-label">Wage Earnings</div>
                <div class="duration-note">Need hours + rate to calculate</div>
              </div>
            </div>
            <div class="duration-val" style="-webkit-text-fill-color:var(--gray-600)">—</div>
          </div>`}
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Other ${svg('chevR')}</button>
      </div>
    </div>`;
  }

  if (sec === 'other') {
    const other = fd.shift.other;
    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row"><h2 class="section-title">Other Earnings</h2>${sectionStatus('other')}</div>
        </div>
      </div>
      <div class="card form-card">
        <div class="field-section">
          <div class="field-section-hdr">
            <div>
              <div class="field-section-title">Add Earnings Event</div>
              <div class="field-section-sub">Cash, digital, overtime, or miscellaneous earnings from this shift.</div>
            </div>
            <div class="seg-control">
              ${otherEarningTypes.map(type => `<button type="button" class="seg-btn" onclick="addOtherEarning('${type}')">+ ${type}</button>`).join('')}
            </div>
          </div>
          <div class="dash-grid" style="grid-template-columns:repeat(4,minmax(0,1fr));">
            ${otherEarningTypes.map(type => `
              <div class="dash-panel" style="min-height:auto;padding:12px;">
                <div class="dash-label">${type}</div>
                <div class="dash-value">${money(otherTotal(type))}</div>
                <div class="dash-note">${other.entries.filter(entry => entry.type === type).length} entries</div>
              </div>`).join('')}
          </div>
        </div>

        <div class="field-section">
          <div class="field-section-hdr">
            <div>
              <div class="field-section-title">Entries</div>
              <div class="field-section-sub">Each row is included in total earnings.</div>
            </div>
            <strong style="color:var(--emerald-400);font-size:1rem;">${money(otherTotal())}</strong>
          </div>
          ${other.entries.length ? other.entries.map((entry, i) => `
            <div class="card pool-card" style="margin-bottom:8px;">
              <div style="display:grid;grid-template-columns:minmax(120px,.75fr) minmax(110px,.55fr) minmax(180px,1.4fr) auto;gap:10px;align-items:end;">
                <div class="form-group">
                  <label class="form-label-sm">Type</label>
                  <select class="form-input" onchange="updateOtherEarning(${i}, 'type', this.value, false)" onblur="commitFormInput()">
                    ${otherEarningTypes.map(type => `<option value="${type}" ${entry.type === type ? 'selected' : ''}>${type}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group form-input-prefix" style="position:relative">
                  <label class="form-label-sm">Amount</label>
                  <span class="prefix-sym" style="top:calc(50% + 9px);">$</span>
                  <input type="number" class="form-input" style="padding-left:22px" value="${entry.amount ?? ''}" oninput="updateOtherEarningNumber(${i}, this.value, false)" onblur="commitFormInput()" step="0.01">
                </div>
                <div class="form-group">
                  <label class="form-label-sm">Note</label>
                  <input type="text" class="form-input" value="${entry.note || ''}" oninput="updateOtherEarning(${i}, 'note', this.value, false)" onblur="commitFormInput()" placeholder="">
                </div>
                <div style="display:flex;align-items:flex-end;">
                  <button class="btn-danger" onclick="removeOtherEarning(${i})">Remove</button>
                </div>
              </div>
            </div>
          `).join('') : `
            <div style="padding:20px;text-align:center;color:var(--gray-500);font-size:0.8rem;border:1px dashed var(--border);border-radius:var(--radius-lg);">
              No other earnings logged yet.
            </div>`}
        </div>
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Chump ${svg('chevR')}</button>
      </div>
    </div>`;
  }

  if (sec === 'team') {
    ensureTeamInitialized();
    const team = fd.shift.team;
    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row"><h2 class="section-title">Team</h2>${sectionStatus('team')}</div>
        </div>
      </div>
      <div class="card form-card">
        <div>
          <div class="breaks-header" style="margin-bottom:10px;">
            <label class="form-label">Bartenders</label>
            <button class="btn-link" onclick="addTeamMember()">+ Add</button>
          </div>
          <div class="team-table">
            <div class="team-row team-head">
              <div class="team-cell"></div>
              <div class="team-cell">Name</div>
              <div class="team-cell">Start</div>
              <div class="team-cell">End</div>
              <div class="team-cell">Location</div>
              <div class="team-cell">Hours</div>
              <div class="team-cell"></div>
            </div>
            ${team.members.map((m,i)=>`
              <div class="team-row ${m.isUser ? 'team-row-user' : ''}">
                <div class="team-cell" style="justify-content:center;">
                  ${personChip(m.name, i)}
                </div>
                <div class="team-cell">
                  <div class="team-name-wrap">
                    <input type="text" class="form-input" id="team-name-${i}" value="${m.name||''}" onfocus="renderTeamNameSuggestions(${i})" oninput="updateTeamMember(${i},'name',this.value, false); renderTeamNameSuggestions(${i})" onblur="commitTeamName(${i})" onkeydown="teamCellKeydown(event, ${i}, 'name')">
                    ${m.isUser ? `<span class="team-user-badge" title="You">${svg('crown',13)}</span>` : ''}
                  </div>
                </div>
                <div class="team-cell">
                  ${renderSmartTimeField({ id: 'team-start-'+i, label: '', value: m.startTime, required: false, isEnd: false })}
                </div>
                <div class="team-cell">
                  ${renderSmartTimeField({ id: 'team-end-'+i, label: '', value: m.endTime, required: false, isEnd: true })}
                </div>
                <div class="team-cell">
                  <div id="disp-team-location-${i}" onclick="activateTeamLocation(${i})" style="width:100%;">
                    ${locationDisplay(m.location)}
                  </div>
                  <input type="text" class="form-input location-input location-${(m.location || '').toLowerCase()}" id="team-location-${i}" value="${m.location || ''}" style="display:none;" oninput="updateTeamLocationInput(${i}, this.value)" onblur="commitTeamLocation(${i})" onkeydown="teamCellKeydown(event, ${i}, 'location')">
                </div>
                <div class="team-cell">
                  ${(() => { const h = calcDuration(m.startTime, m.endTime); return `<div class="team-hours ${h !== null ? 'active' : ''}">${h !== null ? h.toFixed(1) : '—'}</div>`; })()}
                </div>
                <div class="team-cell">
                  ${m.isUser ? '' : `<button class="btn-danger" onclick="removeTeamMember(${i})">×</button>`}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Events ${svg('chevR')}</button>
      </div>
    </div>`;
  }

  if (sec === 'events') {
    const ev = fd.shift.events;
    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row"><h2 class="section-title">Events</h2>${sectionStatus('events')}</div>
        </div>
      </div>
      <div class="card form-card">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Busy Level</label>
            <div style="display:flex;gap:6px;">
              ${busyLabels.map((lbl,i)=>`<button onclick="updateEvents('busyLevel',${i+1})" style="flex:1;padding:6px 4px;border-radius:var(--radius-md);font-size:0.65rem;font-weight:600;cursor:pointer;border:1px solid ${ev.busyLevel===i+1?'rgba(245,158,11,.5)':'var(--border)'};background:${ev.busyLevel===i+1?'rgba(245,158,11,.12)':'transparent'};color:${ev.busyLevel===i+1?'var(--amber-400)':'var(--gray-500)'};transition:all 0.15s;">${lbl}</button>`).join('')}
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Shift Rating</label>
            <div style="display:flex;gap:4px;">
              ${[1,2,3,4,5].map(n=>`<button onclick="updateEvents('shiftRating',${n})" style="flex:1;padding:8px 4px;border-radius:var(--radius-md);font-size:0.85rem;cursor:pointer;border:1px solid ${n<=(ev.shiftRating||0)?'rgba(245,158,11,.4)':'var(--border)'};background:${n<=(ev.shiftRating||0)?'rgba(245,158,11,.1)':'transparent'};color:${n<=(ev.shiftRating||0)?'var(--amber-400)':'var(--gray-600)'};transition:all 0.1s;">★</button>`).join('')}
            </div>
          </div>
        </div>
        <div>
          <div class="breaks-header" style="margin-bottom:10px;">
            <label class="form-label">Notable Events</label>
            <button class="btn-link" onclick="addEvent()">+ Add Event</button>
          </div>
          ${ev.items.map((item,i)=>`
            <div class="card break-card" style="margin-bottom:8px;">
              <div style="display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:end;">
                <div>
                  <label class="form-label-sm">Time</label>
                  ${renderSmartTimeField({ id: 'evt-'+i, label: '', value: item.time, required: false, isEnd: false })}
                </div>
                <div class="form-group">
                  <label class="form-label-sm">Description</label>
                  <input type="text" class="form-input" value="${item.desc||''}" oninput="updateEvent(${i},'desc',this.value, false)" onblur="commitFormInput()" placeholder="">
                </div>
                <div style="display:flex;align-items:flex-end;">
                  <button class="btn-danger" onclick="removeEvent(${i})">Remove</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Notes ${svg('chevR')}</button>
      </div>
    </div>`;
  }

  if (sec === 'chump') {
    const ch = fd.shift.chump;
    const played = ch.played === true;
    const chumpTotal = ch.useDetailedAmount ? (Number(ch.coins || 0) + Number(ch.cash || 0)) : Number(ch.amount || 0);
    const teamChoices = fd.shift.team.members.filter(m => !isEmptyTeamMember(m) && m.name);
    const chumpPlayers = ch.players || [];
    const playerNames = [...new Set([...teamChoices.map(m => m.name), ...chumpPlayers].filter(Boolean))];
    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row"><h2 class="section-title">Chump</h2>${sectionStatus('chump')}</div>
        </div>
      </div>
      <div class="card form-card">
        <div class="field-section">
          <button class="big-toggle ${played ? 'active' : ''}" type="button" onclick="toggleChumpPlayed()">
            <span>
              <span class="big-toggle-title">${played ? 'Chump game played' : 'No Chump game'}</span>
              <span class="big-toggle-sub">Track the closer coin-flip game, winner payout, player count, and expected-value data.</span>
            </span>
            <span class="toggle-knob"></span>
          </button>
        </div>

        <div class="field-section ${played ? '' : 'muted'}">
          <div class="field-section-hdr">
            <div>
              <div class="field-section-title">Result</div>
              <div class="field-section-sub">Whether you personally won or lost the flip.</div>
            </div>
            ${statusPill(played ? 'Applicable' : 'Hidden', played ? 'live' : 'muted')}
          </div>
          <div class="seg-control">
            <button type="button" class="seg-btn win ${ch.didWin === true ? 'active' : ''}" onclick="updateChump('didWin', true)">Win</button>
            <button type="button" class="seg-btn loss ${ch.didWin === false ? 'active' : ''}" onclick="updateChump('didWin', false)">Loss</button>
          </div>
        </div>

        <div class="field-section ${played ? '' : 'muted'}">
          <div class="field-section-hdr">
            <div>
              <div class="field-section-title">Chump Amount</div>
              <div class="field-section-sub">Log the winner payout. Use total amount, or split it into coins and leftover cash.</div>
            </div>
            <div class="seg-control">
              <button type="button" class="seg-btn ${!ch.useDetailedAmount ? 'active' : ''}" onclick="updateChump('useDetailedAmount', false)">Total</button>
              <button type="button" class="seg-btn ${ch.useDetailedAmount ? 'active' : ''}" onclick="updateChump('useDetailedAmount', true)">Detail</button>
            </div>
          </div>
          ${ch.useDetailedAmount ? `
            <div class="form-grid">
              <div class="form-group form-input-prefix" style="position:relative">
                <label class="form-label-sm">Coins</label>
                <span class="prefix-sym" style="top:calc(50% + 9px);">$</span>
                <input type="number" class="form-input" style="padding-left:22px" value="${ch.coins ?? ''}" oninput="updateChumpNumber('coins', this.value, false)" onblur="commitFormInput()" step="0.01">
              </div>
              <div class="form-group form-input-prefix" style="position:relative">
                <label class="form-label-sm">Cash</label>
                <span class="prefix-sym" style="top:calc(50% + 9px);">$</span>
                <input type="number" class="form-input" style="padding-left:22px" value="${ch.cash ?? ''}" oninput="updateChumpNumber('cash', this.value, false)" onblur="commitFormInput()" step="0.01">
              </div>
            </div>` : `
            <div class="form-group form-input-prefix" style="position:relative;max-width:260px;">
              <label class="form-label-sm">Amount Winner Gets</label>
              <span class="prefix-sym" style="top:calc(50% + 9px);">$</span>
              <input type="number" class="form-input" style="padding-left:22px" value="${ch.amount ?? ''}" oninput="updateChumpNumber('amount', this.value, false)" onblur="commitFormInput()" step="0.01">
            </div>`}
          <div class="duration-bar" style="margin-top:12px;border-color:rgba(245,158,11,.22);background:rgba(245,158,11,.06)">
            <div class="duration-left">
              <div class="duration-dot" style="background:var(--amber-400)"></div>
              <div>
                <div class="duration-label">Recorded Payout</div>
                <div class="duration-note">${ch.useDetailedAmount ? 'Coins plus cash' : 'Manual total amount'}</div>
              </div>
            </div>
            <div class="duration-val" style="background:linear-gradient(135deg,var(--amber-400),#f97316);-webkit-background-clip:text">${money(chumpTotal)}</div>
          </div>
        </div>

        <div class="field-section ${played ? '' : 'muted'}">
          <div class="field-section-hdr">
            <div>
              <div class="field-section-title">Players</div>
              <div class="field-section-sub">Capture how many closers played and who was in the game for odds tracking later.</div>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label-sm">People Played</label>
              <input type="number" class="form-input" value="${ch.playerCount ?? ''}" oninput="updateChumpNumber('playerCount', this.value, false)" onblur="commitFormInput()" min="0" step="1">
            </div>
            <div class="form-group">
              <label class="form-label-sm">Winner</label>
              <select class="form-input" onchange="updateChump('winnerName', this.value)">
                <option value="">Unknown / not logged</option>
                ${playerNames.map(name => `<option value="${name}" ${ch.winnerName === name ? 'selected' : ''}>${name}</option>`).join('')}
                ${ch.winnerName && !playerNames.includes(ch.winnerName) ? `<option value="${ch.winnerName}" selected>${ch.winnerName}</option>` : ''}
              </select>
            </div>
          </div>
          ${teamChoices.length ? `
            <div style="margin-top:12px;">
              <label class="form-label-sm" style="display:block;margin-bottom:8px;">Select from Team</label>
              <div class="chip-grid">
                ${teamChoices.map((m, i) => `<button type="button" class="select-chip ${chumpPlayers.includes(m.name) ? 'active' : ''}" onclick="toggleChumpPlayer('${m.name}')">${personChip(m.name, i, true)} ${m.name}</button>`).join('')}
              </div>
            </div>` : `
            <div class="dash-note" style="margin-top:12px;">Add bartenders in Team to select players here.</div>`}
          <div class="form-group" style="margin-top:12px;max-width:420px;">
            <label class="form-label-sm">Add Player Manually</label>
            <div style="display:grid;grid-template-columns:1fr auto;gap:8px;">
              <input type="text" class="form-input" id="chump-player-input" list="chump-player-options" onkeydown="chumpPlayerInputKeydown(event)" placeholder="">
              <button class="btn btn-secondary" type="button" onclick="addChumpPlayer(document.getElementById('chump-player-input')?.value)">Add</button>
            </div>
            <datalist id="chump-player-options">
              ${[...new Set([...employeeNames, ...teamChoices.map(m => m.name)])].map(name => `<option value="${name}"></option>`).join('')}
            </datalist>
          </div>
        </div>

        <div class="field-section ${played ? '' : 'muted'}">
          <div class="field-section-hdr">
            <div>
              <div class="field-section-title">Notes</div>
              <div class="field-section-sub">Optional context about odd payouts, extra dollars, or who flipped.</div>
            </div>
          </div>
          <textarea class="form-input" rows="2" placeholder="" oninput="updateChump('notes',this.value, false)" onblur="commitFormInput()" style="resize:vertical;">${ch.notes||''}</textarea>
        </div>

        ${!played ? `
          <div class="field-section muted">
            <div class="field-section-title">Not applicable</div>
            <div class="field-section-sub">Turn on Chump game played to reveal result, payout, players, and winner fields.</div>
          </div>` : ''}
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Team ${svg('chevR')}</button>
      </div>
    </div>`;
  }

  if (sec === 'notes') {
    const no = fd.shift.notes;
    const moods = [['😤','Rough'],['😐','Meh'],['🙂','Decent'],['😊','Good'],['🤩','Amazing']];
    const tagOptions = ['Late customers','No-shows','Kitchen issues','Short staffed','Rushed','Fun crew','Good music','Ran out of items','Karaoke','Private event'];
    return `
    <div class="animate-in">
      <div class="section-header">
        <div>
          <div class="section-row"><h2 class="section-title">Notes</h2>${sectionStatus('notes')}</div>
        </div>
      </div>
      <div class="card form-card">
        <div class="form-group">
          <label class="form-label">How did you feel?</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${moods.map(([em,lbl],i)=>`
              <button onclick="updateNotes('mood',${i})" style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:var(--radius-lg);font-size:0.7rem;font-weight:600;cursor:pointer;border:1px solid ${no.mood===i?'rgba(139,92,246,.6)':'var(--border)'};background:${no.mood===i?'rgba(139,92,246,.12)':'rgba(10,15,26,.5)'};color:${no.mood===i?'var(--purple-400)':'var(--gray-500)'};transition:all 0.15s;">
                <span style="font-size:1.4rem">${em}</span>${lbl}
              </button>
            `).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Tags</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${tagOptions.map(t=>`
              <button onclick="toggleTag('${t}')" style="padding:5px 10px;border-radius:999px;font-size:0.72rem;font-weight:500;cursor:pointer;border:1px solid ${no.tags.includes(t)?'rgba(96,165,250,.6)':'var(--border)'};background:${no.tags.includes(t)?'rgba(96,165,250,.12)':'rgba(10,15,26,.5)'};color:${no.tags.includes(t)?'var(--blue-300)':'var(--gray-500)'};transition:all 0.15s;">${t}</button>
            `).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Free Notes</label>
          <textarea class="form-input" rows="4" placeholder="" oninput="updateNotes('text',this.value, false)" onblur="commitFormInput()" style="resize:vertical;">${no.text||''}</textarea>
          <div style="font-size:0.7rem;color:var(--gray-600);text-align:right;margin-top:2px;">${(no.text||'').length} chars</div>
        </div>
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="handleSave()">Save Shift ${svg('check')}</button>
      </div>
    </div>`;
  }

  return `<div class="animate-in"><div class="card form-card" style="align-items:center;padding:40px;text-align:center;"><div style="color:var(--gray-500);font-size:0.85rem;">Section not found</div></div></div>`;
}

// ─────────────────────────────────────────────
//  SMART TIME FIELD INTERACTIONS
// ─────────────────────────────────────────────
function activateTimeField(id) {
  const disp = document.getElementById('disp-' + id);
  const inp = document.getElementById('input-' + id);
  if (!disp || !inp) return;
  disp.classList.add('hidden');
  inp.classList.add('active');
  inp.focus();
  inp.select();
}

function focusTimeFieldAfterRender(id) {
  requestAnimationFrame(() => activateTimeField(id));
}

function focusFieldAfterRender(id) {
  requestAnimationFrame(() => {
    if (document.getElementById('disp-' + id) && document.getElementById('input-' + id)) {
      activateTimeField(id);
      return;
    }
    if (id.startsWith('team-location-')) {
      const row = parseInt(id.replace('team-location-', ''), 10);
      activateTeamLocation(row);
      return;
    }
    const el = document.getElementById(id);
    if (!el) return;
    el.focus();
    if (typeof el.select === 'function') el.select();
  });
}

function getTimeFieldOrder() {
  if (state.activeSection === 'times') {
    return [
      'start',
      'end',
      ...state.formData.shift.times.breaks.flatMap((_, i) => [`brk-start-${i}`, `brk-end-${i}`])
    ];
  }
  if (state.activeSection === 'wage') return ['wage-start', 'wage-end'];
  if (state.activeSection === 'events') {
    return state.formData.shift.events.items.map((_, i) => `evt-${i}`);
  }
  if (state.activeSection === 'team') {
    return state.formData.shift.team.members.flatMap((_, i) => [`team-start-${i}`, `team-end-${i}`]);
  }
  return [];
}

function getTeamFieldOrder() {
  return state.formData.shift.team.members.flatMap((_, i) => [
    `team-name-${i}`,
    `team-start-${i}`,
    `team-end-${i}`,
    `team-location-${i}`
  ]);
}

function getTimeFieldValue(id) {
  if (id === 'start') return state.formData.shift.times.start;
  if (id === 'end') return state.formData.shift.times.end;
  if (id === 'wage-start') return state.formData.shift.wage.startTime;
  if (id === 'wage-end') return state.formData.shift.wage.endTime;
  if (id.startsWith('brk-start-')) {
    const i = parseInt(id.replace('brk-start-', ''), 10);
    return state.formData.shift.times.breaks[i]?.start || null;
  }
  if (id.startsWith('brk-end-')) {
    const i = parseInt(id.replace('brk-end-', ''), 10);
    return state.formData.shift.times.breaks[i]?.end || null;
  }
  if (id.startsWith('evt-')) {
    const i = parseInt(id.replace('evt-', ''), 10);
    return state.formData.shift.events.items[i]?.time || null;
  }
  if (id.startsWith('team-start-')) {
    const i = parseInt(id.replace('team-start-', ''), 10);
    return state.formData.shift.team.members[i]?.startTime || null;
  }
  if (id.startsWith('team-end-')) {
    const i = parseInt(id.replace('team-end-', ''), 10);
    return state.formData.shift.team.members[i]?.endTime || null;
  }
  return null;
}

function setTimeFieldValue(id, value24) {
  if (id === 'start') state.formData.shift.times.start = value24;
  else if (id === 'end') state.formData.shift.times.end = value24;
  else if (id === 'wage-start') state.formData.shift.wage.startTime = value24;
  else if (id === 'wage-end') state.formData.shift.wage.endTime = value24;
  else if (id.startsWith('brk-start-')) { const i = parseInt(id.replace('brk-start-', ''), 10); state.formData.shift.times.breaks[i].start = value24; }
  else if (id.startsWith('brk-end-')) { const i = parseInt(id.replace('brk-end-', ''), 10); state.formData.shift.times.breaks[i].end = value24; }
  else if (id.startsWith('evt-')) { const i = parseInt(id.replace('evt-', ''), 10); state.formData.shift.events.items[i].time = value24; }
  else if (id.startsWith('team-start-')) { const i = parseInt(id.replace('team-start-', ''), 10); state.formData.shift.team.members[i].startTime = value24; }
  else if (id.startsWith('team-end-')) { const i = parseInt(id.replace('team-end-', ''), 10); state.formData.shift.team.members[i].endTime = value24; }
}

function closeTimeField(id) {
  const disp = document.getElementById('disp-' + id);
  const inp = document.getElementById('input-' + id);
  const hint = document.getElementById('hint-' + id);
  if (inp) inp.classList.remove('active');
  if (disp) disp.classList.remove('hidden');
  if (hint) {
    hint.className = 'time-parse-hint dim';
    hint.textContent = '';
  }
}

function livePreviewTime(id, isEnd) {
  const inp = document.getElementById('input-' + id);
  const hint = document.getElementById('hint-' + id);
  if (!inp || !hint) return;
  const raw = inp.value;
  if (!raw.trim()) {
    hint.className = 'time-parse-hint dim';
    hint.textContent = '';
    return;
  }
  let preview;
  if (isEnd === true || isEnd === 'true') {
    preview = previewTimeInput(raw, getTimeContextStartHour(id));
  } else {
    preview = previewTimeInput(raw, undefined);
  }
  if (preview.valid === true) {
    hint.className = 'time-parse-hint ok';
    hint.textContent = preview.display;
  } else if (preview.valid === false) {
    hint.className = 'time-parse-hint err';
    hint.textContent = preview.display;
  } else {
    hint.className = 'time-parse-hint dim';
    hint.textContent = '';
  }
}

function commitTimeField(id, fieldType) {
  const inp = document.getElementById('input-' + id);
  if (!inp) return;
  const raw = inp.value.trim();
  let value24 = null;
  if (raw) {
    if (fieldType === 'end') {
      const parsed = parseEndTimeWithContext(raw, getTimeContextStartHour(id));
      value24 = formatTime24(parsed);
    } else {
      const parsed = parseTimeInput(raw);
      value24 = formatTime24(parsed);
    }
  }
  if (value24 === getTimeFieldValue(id)) {
    closeTimeField(id);
    return;
  }
  setTimeFieldValue(id, value24);
  render({ suppressAnimation: true });
}

function timeFieldKeydown(e, id, fieldType) {
  if (e.key === 'Enter') { e.preventDefault(); commitTimeField(id, fieldType); }
  if (e.key === 'Escape') { e.preventDefault(); render(); }
  if (e.key === 'Tab') {
    const order = state.activeSection === 'team' ? getTeamFieldOrder() : getTimeFieldOrder();
    const currentIndex = order.indexOf(id);
    const nextIndex = currentIndex + (e.shiftKey ? -1 : 1);
    const nextId = order[nextIndex];
    if (nextId) {
      e.preventDefault();
      commitTimeField(id, fieldType);
      focusFieldAfterRender(nextId);
    } else if (state.activeSection === 'team' && !e.shiftKey && id.startsWith('team-end-')) {
      e.preventDefault();
      commitTimeField(id, fieldType);
      const i = parseInt(id.replace('team-end-', ''), 10);
      addTeamMember(false);
      render({ suppressAnimation: true });
      focusFieldAfterRender(`team-name-${i + 1}`);
    }
  }
}

// ─────────────────────────────────────────────
//  SMART DATE FIELD INTERACTIONS
// ─────────────────────────────────────────────
function activateDateField() {
  const disp = document.getElementById('disp-date');
  const inp = document.getElementById('input-date');
  if (!disp || !inp) return;
  disp.classList.add('hidden');
  inp.classList.add('active');
  inp.focus();
  inp.select();
}

function livePreviewDate() {
  const inp = document.getElementById('input-date');
  const hint = document.getElementById('hint-date');
  if (!inp || !hint) return;
  const raw = inp.value;
  if (!raw.trim()) {
    hint.className = 'date-parse-hint dim';
    hint.textContent = '';
    return;
  }
  const preview = previewDateInput(raw);
  if (preview.valid === true) {
    hint.className = 'date-parse-hint ok';
    hint.textContent = preview.display;
  } else if (preview.valid === false) {
    hint.className = 'date-parse-hint err';
    hint.textContent = preview.display;
  }
}

function commitDateField() {
  const inp = document.getElementById('input-date');
  if (!inp) return;
  const raw = inp.value.trim();
  if (!raw) { render(); return; }
  const d = parseDateInput(raw);
  if (d) {
    state.formData.shift.date = dateToISO(d);
    state.seededDate = false;
  }
  render();
}

function dateFieldKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); commitDateField(); }
  if (e.key === 'Escape') { e.preventDefault(); render(); }
}

function openDatePicker() {
  const picker = document.getElementById('native-date-picker');
  if (!picker) return;
  if (typeof picker.showPicker === 'function') picker.showPicker();
  else picker.click();
}

function nativeDatePicked(val) {
  if (val) {
    state.formData.shift.date = val;
    state.seededDate = false;
    render();
  }
}

// ─────────────────────────────────────────────
//  EVENT HANDLERS
// ─────────────────────────────────────────────
function setSection(id) {
  if (state.activeSection === 'team' && id !== 'team') pruneEmptyTeamMembers();
  state.activeSection = id;
  state.navFocusIndex = Math.max(0, navOrder.indexOf(id));
  state.focusedGroupIndex = 0;
  state.navFocused = false;
  render();
}
function nextSection() { const i = sectionOrder.indexOf(state.activeSection); if (i < sectionOrder.length - 1) setSection(sectionOrder[i+1]); }
function prevSection() { const i = sectionOrder.indexOf(state.activeSection); if (i > 0) setSection(sectionOrder[i-1]); else setSection('home'); }

function focusNavPanel() {
  state.navFocused = true;
  if (state.navFocusIndex < 0) state.navFocusIndex = Math.max(0, navOrder.indexOf(state.activeSection));
  render({ suppressAnimation: true });
}

function moveNavFocus(delta) {
  state.navFocused = true;
  state.navFocusIndex = (state.navFocusIndex + delta + navOrder.length) % navOrder.length;
  render({ suppressAnimation: true });
}

function openFocusedNav() {
  setSection(navOrder[state.navFocusIndex] || 'home');
}

function isFieldTarget(target) {
  return !!target?.matches?.('input, textarea, select, [contenteditable="true"]');
}

function focusFirstSectionInput() {
  const main = document.querySelector('.main');
  const target = main?.querySelector('.smart-date-display, .smart-time-display, input.form-input, textarea.form-input, select.form-input, .location-display');
  if (!target) return;
  if (target.classList.contains('smart-date-display')) activateDateField();
  else if (target.classList.contains('smart-time-display')) activateTimeField(target.id.replace('disp-', ''));
  else if (target.classList.contains('location-display')) {
    const id = target.closest('[id^="disp-team-location-"]')?.id;
    if (id) activateTeamLocation(parseInt(id.replace('disp-team-location-', ''), 10));
  } else {
    target.focus();
    if (typeof target.select === 'function') target.select();
  }
}

function formGroups() {
  return [...document.querySelectorAll('.main .form-card > div')]
    .filter(group => !group.classList.contains('duration-bar') && !group.classList.contains('muted'))
    .filter(group => group.querySelector('input, textarea, select, button, .smart-time-display, .smart-date-display, .location-display'));
}

const fieldSelector = '.smart-date-display:not(.hidden), .smart-time-display:not(.hidden), input.form-input:not([type="hidden"]), textarea.form-input, select.form-input, .location-display, button:not(.btn-danger):not(.btn-link):not(.tool-chip)';

function applyFocusedGroupClass() {
  const groups = formGroups();
  groups.forEach((group, index) => {
    group.classList.toggle('group-focused', index === state.focusedGroupIndex && state.activeSection !== 'home');
    group.tabIndex = 0;
  });
}

function setFocusedGroup(index, { edit = false, scroll = true } = {}) {
  const groups = formGroups();
  if (!groups.length) return;
  state.focusedGroupIndex = (index + groups.length) % groups.length;
  applyFocusedGroupClass();
  const group = groups[state.focusedGroupIndex];
  if (scroll) group.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  if (edit) focusControlInGroup(group);
  else group.focus({ preventScroll: true });
}

function currentGroup() {
  const groups = formGroups();
  const activeGroup = document.activeElement?.closest?.('.main .form-card > div');
  if (activeGroup && groups.includes(activeGroup)) {
    state.focusedGroupIndex = groups.indexOf(activeGroup);
    applyFocusedGroupClass();
    return activeGroup;
  }
  return groups[state.focusedGroupIndex] || groups[0] || null;
}

function focusControlInGroup(group) {
  const target = group?.querySelector(fieldSelector);
  if (!target) return;
  if (target.classList.contains('smart-date-display')) activateDateField();
  else if (target.classList.contains('smart-time-display')) activateTimeField(target.id.replace('disp-', ''));
  else if (target.classList.contains('location-display')) {
    const id = target.closest('[id^="disp-team-location-"]')?.id;
    if (id) activateTeamLocation(parseInt(id.replace('disp-team-location-', ''), 10));
  } else {
    target.focus();
    if (typeof target.select === 'function' && target.matches('input, textarea')) target.select();
  }
}

function focusNextGroup(delta = 1) {
  const groups = formGroups();
  if (!groups.length) return;
  const activeGroup = document.activeElement?.closest?.('.main .form-card > div');
  let index = groups.indexOf(activeGroup);
  if (index === -1) index = state.focusedGroupIndex ?? (delta > 0 ? -1 : 0);
  setFocusedGroup(index + delta, { edit: false });
}

function commitActiveFieldSilently() {
  const active = document.activeElement;
  if (!active) return;
  if (active.classList?.contains('smart-time-input')) {
    const id = active.id.replace('input-', '');
    const raw = active.value.trim();
    let value24 = null;
    if (raw) {
      const parsed = id.includes('end') ? parseEndTimeWithContext(raw, getTimeContextStartHour(id)) : parseTimeInput(raw);
      value24 = formatTime24(parsed);
    }
    setTimeFieldValue(id, value24);
    closeTimeField(id);
    return;
  }
  if (active.classList?.contains('smart-date-input')) {
    const raw = active.value.trim();
    if (raw) {
      const d = parseDateInput(raw);
      if (d) {
        state.formData.shift.date = dateToISO(d);
        state.seededDate = false;
      }
    }
    active.classList.remove('active');
    document.getElementById('disp-date')?.classList.remove('hidden');
    return;
  }
}

function fieldsInScope() {
  return [...document.querySelectorAll('.main ' + fieldSelector)]
    .filter(el => !el.disabled && !el.closest('.muted'))
    .filter(el => !el.classList.contains('hidden') && el.style.display !== 'none');
}

function focusElement(el) {
  if (!el) return;
  const group = el.closest('.main .form-card > div');
  if (group) {
    const groups = formGroups();
    const index = groups.indexOf(group);
    if (index !== -1) state.focusedGroupIndex = index;
    applyFocusedGroupClass();
  }
  if (el.classList.contains('smart-date-display')) activateDateField();
  else if (el.classList.contains('smart-time-display')) activateTimeField(el.id.replace('disp-', ''));
  else if (el.classList.contains('location-display')) {
    const id = el.closest('[id^="disp-team-location-"]')?.id;
    if (id) activateTeamLocation(parseInt(id.replace('disp-team-location-', ''), 10));
  } else {
    el.focus();
    if (typeof el.select === 'function' && el.matches('input, textarea')) el.select();
  }
}

function focusNextField(delta = 1) {
  commitActiveFieldSilently();
  const fields = fieldsInScope();
  if (!fields.length) return;
  const active = document.activeElement;
  let index = fields.indexOf(active);
  if (index === -1 && active?.classList?.contains('smart-time-input')) {
    index = fields.findIndex(field => field.id === 'disp-' + active.id.replace('input-', ''));
  }
  if (index === -1 && active?.classList?.contains('smart-date-input')) {
    index = fields.findIndex(field => field.id === 'disp-date');
  }
  if (index === -1) {
    const group = currentGroup();
    const groupFields = fields.filter(field => group?.contains(field));
    if (groupFields.length) {
      focusElement(delta > 0 ? groupFields[0] : groupFields[groupFields.length - 1]);
      return;
    }
    index = delta > 0 ? -1 : 0;
  }
  focusElement(fields[(index + delta + fields.length) % fields.length]);
}

function editFocusedGroup() {
  focusControlInGroup(currentGroup());
}

function handleGlobalShortcut(e) {
  if (e.altKey && e.shiftKey && e.key === 'ArrowRight') { e.preventDefault(); nextSection(); return; }
  if (e.altKey && e.shiftKey && e.key === 'ArrowLeft') { e.preventDefault(); prevSection(); return; }
  if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); focusNextField(1); return; }
  if (e.altKey && e.key === 'ArrowLeft') { e.preventDefault(); focusNextField(-1); return; }
  if (e.altKey && e.key === 'ArrowDown') { e.preventDefault(); focusNextGroup(1); return; }
  if (e.altKey && e.key === 'ArrowUp') { e.preventDefault(); focusNextGroup(-1); return; }
  if (e.altKey && e.key === 'Enter') { e.preventDefault(); focusNextField(1); return; }
  if (e.altKey && e.key === ' ') { e.preventDefault(); editFocusedGroup(); return; }
  if (isFieldTarget(e.target)) {
    if (e.key === 'Escape') {
      e.preventDefault();
      const group = e.target.closest('.main .form-card > div');
      e.target.blur();
      const groups = formGroups();
      const index = groups.indexOf(group);
      if (index !== -1) setFocusedGroup(index, { edit: false, scroll: false });
    }
    return;
  }
  const key = e.key.toLowerCase();
  if (key === 'l') { e.preventDefault(); focusNavPanel(); return; }
  if (key === 'g') { e.preventDefault(); focusNextGroup(e.shiftKey ? -1 : 1); return; }
  if (key === 'n') { e.preventDefault(); nextSection(); return; }
  if (key === 'p') { e.preventDefault(); prevSection(); return; }
  if (key === 'escape') { e.preventDefault(); setSection('home'); return; }
  if (key === 'arrowdown') { e.preventDefault(); moveNavFocus(1); return; }
  if (key === 'arrowup') { e.preventDefault(); moveNavFocus(-1); return; }
  if (key === 'enter') {
    e.preventDefault();
    if (state.navFocused) openFocusedNav();
    else if (state.activeSection !== 'home') editFocusedGroup();
    else focusNavPanel();
    return;
  }
  if (key === ' ') {
    e.preventDefault();
    if (state.activeSection === 'home') focusNavPanel();
    else editFocusedGroup();
    return;
  }
  if (/^[1-9]$/.test(key)) {
    e.preventDefault();
    setSection(sectionOrder[Number(key) - 1]);
    return;
  }
  if (sectionShortcuts[key]) {
    e.preventDefault();
    setSection(sectionShortcuts[key]);
  }
}

function pageDelta(delta) {
  if (delta > 0) nextSection();
  else prevSection();
}

function addBreak() { state.formData.shift.times.breaks.push({ start: null, end: null }); render(); }
function removeBreak(i) { state.formData.shift.times.breaks.splice(i, 1); render(); }

function updateTips(val, shouldRender = true) { const v = val.trim() === '' ? null : parseFloat(val); state.formData.shift.tips.amount = isNaN(v) ? null : v; if (shouldRender) render(); }
function addPool() { state.formData.shift.tips.pools.push({ name:'', amount:0 }); render(); }
function removePool(i) { state.formData.shift.tips.pools.splice(i, 1); render(); }
function updatePool(i, field, val, shouldRender = true) { state.formData.shift.tips.pools[i][field] = val; if (shouldRender) render(); }

function updateWageRate(val, shouldRender = true) { state.formData.shift.wage.hourlyRate = val; if (shouldRender) render(); }

function markOtherLogged() {
  if (!state.completedSections.includes('other')) state.completedSections.push('other');
}

function addOtherEarning(type = 'Cash') {
  state.formData.shift.other.entries.push({ type, amount: null, note: '' });
  markOtherLogged();
  render({ suppressAnimation: true });
}

function removeOtherEarning(i) {
  state.formData.shift.other.entries.splice(i, 1);
  render({ suppressAnimation: true });
}

function updateOtherEarning(i, field, value, shouldRender = true) {
  if (!state.formData.shift.other.entries[i]) return;
  state.formData.shift.other.entries[i][field] = value;
  markOtherLogged();
  if (shouldRender) render({ suppressAnimation: true });
}

function updateOtherEarningNumber(i, raw, shouldRender = true) {
  const trimmed = String(raw).trim();
  const value = trimmed === '' ? null : Number(trimmed);
  updateOtherEarning(i, 'amount', Number.isNaN(value) ? null : value, shouldRender);
}

function makeTeamMember({ isUser = false } = {}) {
  return {
    name: isUser ? currentUserName : '',
    startTime: isUser ? state.formData.shift.times.start : null,
    endTime: isUser ? state.formData.shift.times.end : null,
    location: null,
    isUser
  };
}

function ensureTeamInitialized() {
  const team = state.formData.shift.team;
  if (team.initialized) return;
  team.members.unshift(makeTeamMember({ isUser: true }));
  team.initialized = true;
}

function addTeamMember(shouldRender = true) {
  state.formData.shift.team.members.push(makeTeamMember());
  if (!state.completedSections.includes('team')) state.completedSections.push('team');
  if (shouldRender) render();
}
function removeTeamMember(i) {
  if (state.formData.shift.team.members[i]?.isUser) return;
  state.formData.shift.team.members.splice(i, 1);
  render();
}
function updateTeamMember(i, field, val, shouldRender = true) {
  state.formData.shift.team.members[i][field] = val;
  if (!state.completedSections.includes('team')) state.completedSections.push('team');
  if (shouldRender) render();
}
function updateTeam(field, val, shouldRender = true) { state.formData.shift.team[field] = val; if (!state.completedSections.includes('team')) state.completedSections.push('team'); if (shouldRender) render(); }

function setTeamLocation(i, location, shouldRender = true) {
  state.formData.shift.team.members[i].location = location;
  if (!state.completedSections.includes('team')) state.completedSections.push('team');
  if (shouldRender) render({ suppressAnimation: true });
}

function updateTeamLocationInput(i, raw) {
  const location = locationFromInput(raw);
  state.formData.shift.team.members[i].location = location;
  const inp = document.getElementById(`team-location-${i}`);
  if (inp) {
    inp.value = location || raw.toUpperCase().slice(0, 1);
    inp.className = `form-input location-input ${location ? 'location-' + location.toLowerCase() : ''}`;
  }
  if (!state.completedSections.includes('team')) state.completedSections.push('team');
}

function activateTeamLocation(i) {
  const disp = document.getElementById(`disp-team-location-${i}`);
  const inp = document.getElementById(`team-location-${i}`);
  if (!disp || !inp) return;
  disp.style.display = 'none';
  inp.style.display = 'block';
  inp.focus();
  inp.select();
}

function commitTeamLocation(i) {
  const inp = document.getElementById(`team-location-${i}`);
  const disp = document.getElementById(`disp-team-location-${i}`);
  if (inp) inp.style.display = 'none';
  if (disp) disp.style.display = 'block';
  commitFormInput();
}

function renderTeamNameSuggestions(i) {
  const input = document.getElementById(`team-name-${i}`);
  if (!input || document.activeElement !== input) return;
  const wrap = input.closest('.team-name-wrap');
  if (!wrap) return;
  const old = wrap.querySelector('.team-suggest-menu');
  if (old) old.remove();
  const member = state.formData.shift.team.members[i];
  if (member?.isUser) return;
  const matches = teamNameMatches(input.value);
  if (!matches.length) return;
  const menu = document.createElement('div');
  menu.className = 'team-suggest-menu';
  menu.id = `team-name-menu-${i}`;
  menu.innerHTML = matches.map((name, idx) => `<button type="button" class="team-suggest-item ${idx === 0 ? 'active' : ''}" onclick="acceptTeamName(${i}, '${name}')">${personChip(name, idx, true)}<span>${name}</span></button>`).join('');
  wrap.appendChild(menu);
}

function acceptTeamName(i, name) {
  state.formData.shift.team.members[i].name = name;
  render({ suppressAnimation: true });
  focusFieldAfterRender(`team-start-${i}`);
}

function commitTeamName(i) {
  setTimeout(() => {
    const menu = document.getElementById(`team-name-menu-${i}`);
    if (menu) menu.remove();
  }, 120);
}

function isEmptyTeamMember(member) {
  if (!member || member.isUser) return false;
  return !member.name && !member.startTime && !member.endTime && !member.location;
}

function pruneEmptyTeamMembers() {
  state.formData.shift.team.members = state.formData.shift.team.members.filter(member => !isEmptyTeamMember(member));
}

function teamCellKeydown(e, rowIndex, field) {
  if ((e.key === 'Enter' || e.key === 'Tab') && field === 'name') {
    const matches = teamNameMatches(state.formData.shift.team.members[rowIndex]?.name);
    if (matches.length && !state.formData.shift.team.members[rowIndex]?.isUser) {
      e.preventDefault();
      state.formData.shift.team.members[rowIndex].name = matches[0];
      render({ suppressAnimation: true });
      focusFieldAfterRender(e.key === 'Enter' ? `team-name-${rowIndex}` : `team-start-${rowIndex}`);
      return;
    }
  }
  if (e.key !== 'Tab') return;
  const order = getTeamFieldOrder();
  const id = field === 'location' ? `team-location-${rowIndex}` : `team-${field}-${rowIndex}`;
  const currentIndex = order.indexOf(id);
  const nextId = order[currentIndex + (e.shiftKey ? -1 : 1)];
  if (nextId) {
    e.preventDefault();
    commitFormInput();
    focusFieldAfterRender(nextId);
    return;
  }
  if (!e.shiftKey && field === 'location') {
    e.preventDefault();
    addTeamMember(false);
    render({ suppressAnimation: true });
    focusFieldAfterRender(`team-name-${rowIndex + 1}`);
  }
}

function updateEvents(field, val) { state.formData.shift.events[field] = val; if (!state.completedSections.includes('events')) state.completedSections.push('events'); render(); }
function addEvent() { state.formData.shift.events.items.push({ time: null, desc:'' }); render(); }
function removeEvent(i) { state.formData.shift.events.items.splice(i, 1); render(); }
function updateEvent(i, field, val, shouldRender = true) { state.formData.shift.events.items[i][field] = val; if (shouldRender) render(); }

function markChumpLogged() {
  if (!state.completedSections.includes('chump')) state.completedSections.push('chump');
}

function toggleChumpPlayed() {
  const ch = state.formData.shift.chump;
  ch.played = ch.played === true ? false : true;
  markChumpLogged();
  render();
}

function updateChump(field, val, shouldRender = true) {
  state.formData.shift.chump[field] = val;
  if (field !== 'played' && state.formData.shift.chump.played === null) state.formData.shift.chump.played = true;
  markChumpLogged();
  if (shouldRender) render();
}

function updateChumpNumber(field, raw, shouldRender = true) {
  const trimmed = String(raw).trim();
  let value = trimmed === '' ? null : Number(trimmed);
  if (Number.isNaN(value)) value = null;
  if (field === 'playerCount' && value !== null) value = Math.max(0, Math.round(value));
  updateChump(field, value, shouldRender);
}

function toggleChumpPlayer(name) {
  const ch = state.formData.shift.chump;
  if (!ch.players) ch.players = [];
  const idx = ch.players.indexOf(name);
  if (idx === -1) ch.players.push(name);
  else ch.players.splice(idx, 1);
  if (ch.playerCount === null || ch.playerCount < ch.players.length) ch.playerCount = ch.players.length;
  if (ch.played === null) ch.played = true;
  markChumpLogged();
  render({ suppressAnimation: true });
}

function addChumpPlayer(name) {
  const clean = (name || '').trim();
  if (!clean) return;
  const ch = state.formData.shift.chump;
  if (!ch.players) ch.players = [];
  if (!ch.players.includes(clean)) ch.players.push(clean);
  if (ch.playerCount === null || ch.playerCount < ch.players.length) ch.playerCount = ch.players.length;
  if (ch.played === null) ch.played = true;
  markChumpLogged();
  render({ suppressAnimation: true });
}

function chumpPlayerInputKeydown(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  addChumpPlayer(e.target.value);
}

function addNomination() {
  if (!state.formData.shift.chump.nominations) state.formData.shift.chump.nominations = [];
  state.formData.shift.chump.nominations.push({ label:'', reason:'', severity:0 });
  render();
}
function removeNomination(i) {
  if (!state.formData.shift.chump.nominations) return;
  state.formData.shift.chump.nominations.splice(i, 1);
  render();
}
function updateNomination(i, field, val, shouldRender = true) {
  if (!state.formData.shift.chump.nominations?.[i]) return;
  state.formData.shift.chump.nominations[i][field] = val;
  if (shouldRender) render();
}

function updateNotes(field, val, shouldRender = true) { state.formData.shift.notes[field] = val; if (!state.completedSections.includes('notes')) state.completedSections.push('notes'); if (shouldRender) render(); }
function toggleTag(tag) {
  const tags = state.formData.shift.notes.tags;
  const idx = tags.indexOf(tag);
  if (idx === -1) tags.push(tag); else tags.splice(idx, 1);
  render();
}

function applyPattern() {
  state.formData.shift.times.start = '17:00';
  state.formData.shift.times.end = '01:00';
  render();
}

function commitFormInput() {
  render({ suppressAnimation: true });
}

function handleSave() {
  alert('Shift saved!\n\n' + JSON.stringify(state.formData, null, 2).substring(0, 400) + '...');
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); handleSave(); }
  else handleGlobalShortcut(e);
});

document.addEventListener('focusin', e => {
  const group = e.target.closest?.('.main .form-card > div');
  if (group) {
    const groups = formGroups();
    const index = groups.indexOf(group);
    if (index !== -1) {
      state.focusedGroupIndex = index;
      applyFocusedGroupClass();
    }
  }
  if (e.target.matches('input.form-input, textarea.form-input, .smart-time-input, .smart-date-input')) {
    requestAnimationFrame(() => {
      if (typeof e.target.select === 'function') e.target.select();
    });
  }
});

document.addEventListener('click', e => {
  const group = e.target.closest?.('.main .form-card > div');
  if (!group) return;
  const groups = formGroups();
  const index = groups.indexOf(group);
  if (index !== -1) {
    state.focusedGroupIndex = index;
    applyFocusedGroupClass();
  }
});

render();
</script>
</body>
</html>
