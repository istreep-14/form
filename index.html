<!DOCTYPE html>
<html>
<head>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0f1a;
  --bg-secondary: #131929;
  --bg-card: rgba(23, 31, 52, 0.9);
  --bg-card-hover: rgba(31, 42, 66, 0.92);
  --border: rgba(107, 114, 128, 0.36);
  --border-focus: rgba(168, 85, 247, 0.62);
  --purple-300: #d8b4fe;
  --purple-400: #c084fc;
  --purple-500: #a855f7;
  --purple-600: #9333ea;
  --pink-400: #f472b6;
  --pink-500: #ec4899;
  --pink-600: #db2777;
  --amber-400: #fbbf24;
  --emerald-400: #34d399;
  --blue-300: #93c5fd;
  --blue-400: #60a5fa;
  --red-400: #f87171;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #a7b0c0;
  --gray-500: #8791a3;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius-md: 0.65rem;
  --radius-lg: 0.85rem;
  --radius-xl: 1.1rem;
  --transition: 180ms cubic-bezier(0.4,0,0.2,1);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--bg-primary) 0%, #111827 100%);
  color: var(--gray-200);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

.app { padding: 0 0 24px; min-height: 100vh; }
.header { position: fixed; top: 0; left: 260px; right: 0; z-index: 30; margin: 0; background: rgba(10,15,26,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(16px); }
.header-inner { max-width: none; margin: 0; padding: 14px 20px; display: grid; grid-template-columns: minmax(220px, 1fr) minmax(280px, 460px) auto; align-items: center; gap: 18px; }
.header-title { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--purple-400), var(--pink-400)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header-sub { color: var(--gray-500); font-size: 0.8rem; margin-top: 3px; }
.header-btns { display: flex; gap: 8px; }
.header-progress { min-width: 0; }
.header-progress .prog-header { margin-bottom: 7px; }
.header-progress .prog-track { margin-bottom: 0; }
.icon-btn { width: 36px; height: 36px; border-radius: var(--radius-md); border: none; background: transparent; color: var(--gray-400); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
.icon-btn:hover { background: rgba(75,85,99,0.4); }
.icon-btn svg { width: 18px; height: 18px; }
.layout { max-width: none; margin: 0 0 0 260px; padding: 94px 20px 0; display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; }
.layout-home { grid-template-columns: minmax(0, 1fr); }
.layout-home .sidebar-r { display: none; }

/* ─── CARDS ─── */
.card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-xl); transition: border-color var(--transition); }
.card:hover { border-color: rgba(139,92,246,0.3); }
.card-pad { padding: 16px; }

/* ─── LEFT SIDEBAR ─── */
.sidebar-l { position: fixed; left: 0; top: 0; bottom: 0; z-index: 35; width: 260px; padding: 12px; display: flex; flex-direction: column; background: rgba(10,15,26,.94); border-right: 1px solid var(--border); backdrop-filter: blur(16px); }
.sticky { position: sticky; top: 94px; display: flex; flex-direction: column; gap: 12px; max-height: calc(100vh - 176px); overflow-y: auto; }
.sidebar-l .sticky { position: static; top: auto; flex: 1; min-height: 0; max-height: none; overflow: hidden; }
.sidebar-l .card:first-child { flex: 1; min-height: 0; overflow-y: auto; }
.rail-title-card { padding: 14px; border-radius: var(--radius-xl); border: 1px solid rgba(168,85,247,.22); background: linear-gradient(135deg, rgba(139,92,246,.16), rgba(236,72,153,.08)); }
.rail-title { font-size: 1.2rem; font-weight: 850; color: var(--gray-50); line-height: 1.1; }
.rail-subtitle { margin-top: 5px; color: var(--gray-400); font-size: .76rem; line-height: 1.35; }
.prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.prog-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-500); }
.prog-pct { font-size: 0.7rem; font-weight: 700; color: var(--purple-400); }
.prog-track { height: 7px; background: var(--gray-800); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
.prog-fill { height: 100%; background: linear-gradient(to right, var(--purple-500), var(--pink-500)); border-radius: 999px; transition: width 0.4s ease; }
.prog-stats { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--gray-600); }
.nav-group { display: flex; flex-direction: column; gap: 3px; }
.group-label { padding: 0 8px 4px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.badge-red { background: rgba(239,68,68,.15); color: var(--red-400); }
.badge-blue { background: rgba(59,130,246,.15); color: var(--blue-400); }
.badge-amber { background: rgba(245,158,11,.15); color: var(--amber-400); }
.badge-purple { background: rgba(139,92,246,.18); color: var(--purple-400); }
.badge-emerald { background: rgba(16,185,129,.15); color: var(--emerald-400); }
.status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 999px; font-size: 0.68rem; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; white-space: nowrap; }
.status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-muted { background: rgba(107,114,128,.14); color: var(--gray-500); }
.status-live { background: rgba(16,185,129,.14); color: var(--emerald-400); }
.status-warn { background: rgba(245,158,11,.14); color: var(--amber-400); }
.status-required { background: rgba(239,68,68,.14); color: var(--red-400); }
.nav-item { position: relative; display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: transparent; border: none; border-radius: var(--radius-lg); cursor: pointer; width: 100%; text-align: left; color: inherit; transition: all var(--transition); }
.nav-item::before { content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px; background: transparent; border-radius: 0 3px 3px 0; transition: background var(--transition); }
.nav-item:hover:not(.active) { background: rgba(75,85,99,.2); }
.nav-item.active { background: rgba(139,92,246,.14); box-shadow: 0 0 0 1px rgba(139,92,246,.18) inset; }
.nav-item.active::before { background: linear-gradient(to bottom, var(--purple-500), var(--pink-500)); }
.nav-item.kbd-focus { outline: 1px solid rgba(96,165,250,.55); background: rgba(96,165,250,.08); }
.nav-icon { width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-icon svg { width: 16px; height: 16px; }
.bg-purple { background: rgba(139,92,246,.2); color: var(--purple-400); }
.bg-amber { background: rgba(245,158,11,.2); color: var(--amber-400); }
.bg-emerald { background: rgba(16,185,129,.2); color: var(--emerald-400); }
.bg-blue { background: rgba(59,130,246,.2); color: var(--blue-400); }
.bg-pink { background: rgba(236,72,153,.2); color: var(--pink-400); }
.bg-yellow { background: rgba(250,204,21,.2); color: #facc15; }
.nav-text { flex: 1; min-width: 0; }
.nav-title { font-size: 0.82rem; font-weight: 600; color: var(--gray-200); }
.nav-item.active .nav-title { color: var(--gray-50); }
.nav-sub { font-size: 0.72rem; color: var(--gray-400); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-sub.emerald { color: var(--emerald-400); }
.nav-shortcut { min-width: 21px; height: 20px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid rgba(107,114,128,.44); background: rgba(10,15,26,.36); color: var(--gray-300); font-size: .62rem; font-weight: 800; line-height: 1; }
.nav-item.active .nav-shortcut, .nav-item:hover .nav-shortcut { color: var(--blue-300); border-color: rgba(96,165,250,.35); background: rgba(96,165,250,.08); }
.check { width: 16px; height: 16px; color: var(--emerald-400); flex-shrink: 0; opacity: 1 !important; }
.check svg { width: 16px; height: 16px; }
.nav-item-sm { opacity: 1; padding: 7px 12px; }
.nav-item-sm:hover, .nav-item-sm.active { opacity: 1; }
.nav-icon-sm { width: 28px; height: 28px; }
.sidebar-actions { display: flex; flex-direction: column; gap: 7px; padding-top: 10px; border-top: 1px solid var(--border); }
.sidebar-actions .btn { width: 100%; padding: 7px 10px; min-height: 32px; font-size: .74rem; border-radius: var(--radius-md); }

/* ─── BUTTONS ─── */
.btn { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border: none; border-radius: var(--radius-lg); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all var(--transition); overflow: hidden; }
.btn svg { width: 15px; height: 15px; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--purple-600), var(--pink-600)); color: white; box-shadow: 0 4px 14px rgba(139,92,246,.3); }
.btn-primary:hover { box-shadow: 0 6px 18px rgba(139,92,246,.4); }
.btn-secondary { background: rgba(75,85,99,.4); color: var(--gray-300); }
.btn-secondary:hover { background: rgba(75,85,99,.6); }
.btn-text { background: transparent; color: var(--gray-500); font-size: 0.8rem; }
.btn-text:hover { color: var(--gray-300); }
.btn-link { background: none; border: none; color: var(--purple-400); font-size: 0.8rem; font-weight: 600; cursor: pointer; padding: 0; transition: color var(--transition); }
.btn-link:hover { color: var(--purple-300); }
.btn-danger { background: transparent; border: none; color: var(--gray-500); font-size: 0.8rem; padding: 5px 10px; border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition); }
.btn-danger:hover { color: var(--red-400); background: rgba(239,68,68,.1); }
.btn-ghost-blue { background: rgba(59,130,246,.18); color: var(--blue-300); font-size: 0.75rem; padding: 6px 12px; }
.btn-ghost-blue:hover { background: rgba(59,130,246,.3); }
.full { width: 100%; }

/* ─── MAIN ─── */
.main { display: flex; flex-direction: column; gap: 14px; }
.section-tools { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-bottom: -4px; }
.tool-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 9px; border: 1px solid var(--border); border-radius: var(--radius-md); background: rgba(10,15,26,.28); color: var(--gray-300); font-size: .72rem; font-weight: 800; cursor: pointer; transition: all var(--transition); }
.tool-chip:hover { border-color: rgba(96,165,250,.42); background: rgba(96,165,250,.08); color: var(--blue-300); }
.tool-chip kbd { padding: 1px 5px; border-radius: 5px; background: rgba(31,41,55,.82); color: var(--gray-300); font-size: .62rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
.section-title { font-size: 1.4rem; font-weight: 700; color: var(--gray-50); }
.section-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.form-card { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.form-card > div { transition: opacity var(--transition), filter var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition); }
.form-card > div:not(.field-section):has(input, textarea, select, button) {
  padding: 16px;
  border: 1px solid rgba(107,114,128,.28);
  border-radius: var(--radius-lg);
  background: rgba(10,15,26,.18);
}
.form-card > div:not(.field-section):has(input, textarea, select, button):focus-within {
  border-color: rgba(96,165,250,.62);
  background: rgba(96,165,250,.13);
  box-shadow: 0 0 0 1px rgba(96,165,250,.16) inset, 0 10px 28px rgba(0,0,0,.12);
}
.form-card > div.group-focused:not(.field-section):has(input, textarea, select, button) {
  border-color: rgba(96,165,250,.62);
  background: rgba(96,165,250,.13);
  box-shadow: 0 0 0 1px rgba(96,165,250,.16) inset, 0 10px 28px rgba(0,0,0,.12);
}
.form-card:focus-within > div:not(:focus-within):not(.duration-bar),
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) {
  opacity: .78;
  filter: saturate(.72);
}
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .form-input,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .smart-time-display,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .smart-date-display,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .seg-control,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .select-chip,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .form-input,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .smart-time-display,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .smart-date-display,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .seg-control,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .select-chip {
  background-color: transparent;
  border-color: transparent;
  box-shadow: none;
}
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .form-input,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .smart-time-display,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .smart-date-display,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .form-input,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .smart-time-display,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .smart-date-display {
  padding-left: 0;
  padding-right: 0;
}
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .field-section-sub,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .time-parse-hint,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .date-parse-hint,
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) .dash-note,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .field-section-sub,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .time-parse-hint,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .date-parse-hint,
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) .dash-note {
  display: none;
}
.form-card:focus-within > div:not(:focus-within):not(.duration-bar) button:not(.date-picker-btn):not(.btn-link),
.form-card:has(.group-focused) > div:not(.group-focused):not(.duration-bar) button:not(.date-picker-btn):not(.btn-link) {
  background: transparent !important;
  border-color: transparent !important;
  box-shadow: none !important;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.field-section { padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: rgba(10,15,26,.24); transition: opacity var(--transition), filter var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition); }
.field-section:focus-within { border-color: rgba(96,165,250,.62); background: rgba(96,165,250,.13); box-shadow: 0 0 0 1px rgba(96,165,250,.16) inset, 0 10px 28px rgba(0,0,0,.12); }
.field-section.group-focused { border-color: rgba(96,165,250,.62); background: rgba(96,165,250,.13); box-shadow: 0 0 0 1px rgba(96,165,250,.16) inset, 0 10px 28px rgba(0,0,0,.12); }
.form-card:focus-within .field-section:not(:focus-within) { opacity: .78; filter: saturate(.72); }
.field-section.muted { opacity: .46; filter: saturate(.75); }
.field-section.muted * { pointer-events: none; }
.field-section-hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.field-section-title { font-size: .86rem; font-weight: 800; color: var(--gray-100); }
.field-section-sub { margin-top: 3px; color: var(--gray-500); font-size: .73rem; line-height: 1.4; }
.seg-control { display: inline-grid; grid-auto-flow: column; gap: 6px; padding: 4px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: rgba(10,15,26,.35); }
.seg-btn { border: 0; border-radius: var(--radius-md); padding: 8px 12px; min-width: 74px; background: transparent; color: var(--gray-400); font-size: .78rem; font-weight: 800; cursor: pointer; transition: all var(--transition); }
.seg-btn.active { background: rgba(139,92,246,.22); color: var(--gray-50); box-shadow: 0 0 0 1px rgba(168,85,247,.22) inset; }
.seg-btn.win.active { background: rgba(16,185,129,.18); color: var(--emerald-400); }
.seg-btn.loss.active { background: rgba(239,68,68,.15); color: var(--red-400); }
.big-toggle { width: 100%; min-height: 86px; padding: 16px; border: 1px solid rgba(107,114,128,.42); border-radius: var(--radius-lg); background: rgba(10,15,26,.32); color: inherit; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 16px; text-align: left; transition: all var(--transition); }
.big-toggle.active { border-color: rgba(16,185,129,.4); background: rgba(16,185,129,.08); }
.big-toggle-title { font-size: 1rem; font-weight: 850; color: var(--gray-50); }
.big-toggle-sub { margin-top: 4px; font-size: .78rem; color: var(--gray-400); line-height: 1.35; }
.toggle-knob { width: 52px; height: 30px; padding: 3px; border-radius: 999px; background: rgba(75,85,99,.55); flex: 0 0 auto; transition: background var(--transition); }
.toggle-knob::before { content:''; display: block; width: 24px; height: 24px; border-radius: 50%; background: var(--gray-300); transition: transform var(--transition), background var(--transition); }
.big-toggle.active .toggle-knob { background: rgba(16,185,129,.4); }
.big-toggle.active .toggle-knob::before { transform: translateX(22px); background: white; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.select-chip { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--border); border-radius: 999px; background: rgba(10,15,26,.35); color: var(--gray-300); padding: 7px 10px; font-size: .76rem; font-weight: 800; cursor: pointer; transition: all var(--transition); }
.select-chip.active { border-color: rgba(96,165,250,.46); background: rgba(96,165,250,.12); color: var(--blue-300); }
.form-label { font-size: 0.78rem; font-weight: 600; color: var(--gray-300); display: flex; align-items: center; gap: 4px; }
.required { color: var(--purple-400); }
.form-label-sm { font-size: 0.72rem; font-weight: 600; color: var(--gray-400); }
.input-wrap { position: relative; }

/* ─── BASE INPUT ─── */
.form-input {
  width: 100%;
  padding: 9px 12px;
  background: rgba(10,15,26,.6);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--gray-50);
  font-size: 0.85rem;
  transition: border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
textarea.form-input { font-family: inherit; line-height: 1.5; }
.form-input-lg { font-size: 1.5rem; font-weight: 700; padding: 10px 12px 10px 30px; }
.form-input-prefix { position: relative; }
.prefix-sym { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-500); font-size: 1rem; font-weight: 600; pointer-events: none; }
.input-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-600); pointer-events: none; }
.input-icon svg { width: 16px; height: 16px; }

/* ─── SMART TIME INPUT ─── */
.time-field-wrap { position: relative; }

.smart-time-display {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border: 1px solid rgba(75,85,99,0.18);
  border-radius: var(--radius-md);
  cursor: text;
  min-height: 38px;
  background: rgba(10,15,26,0.3);
  transition: border-color var(--transition), background var(--transition);
  user-select: none;
}
.smart-time-display:hover {
  border-color: rgba(75,85,99,0.45);
  background: rgba(10,15,26,0.5);
}
.smart-time-display .time-val {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--gray-100);
  flex: 1;
}
.smart-time-display .time-empty {
  font-size: 0.85rem;
  color: var(--gray-600);
  flex: 1;
  font-style: italic;
}
.smart-time-display .time-edit-hint {
  width: 14px;
  height: 14px;
  color: var(--gray-700);
  flex-shrink: 0;
  transition: color var(--transition);
}
.smart-time-display:hover .time-edit-hint { color: var(--gray-500); }

.smart-time-input {
  width: 100%;
  padding: 9px 12px;
  background: rgba(10,15,26,.8);
  border: 1px solid var(--border-focus);
  border-radius: var(--radius-md);
  color: var(--gray-50);
  font-size: 0.95rem;
  font-weight: 600;
  box-shadow: 0 0 0 3px rgba(139,92,246,.15);
  outline: none;
  letter-spacing: 0.04em;
  display: none;
}
.smart-time-input.active { display: block; }

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const state = {
  activeSection: 'home',
  navFocused: false,
  navFocusIndex: 0,
  focusedGroupIndex: 0,
  completedSections: [],
  seededDate: true,
  formData: {
    shift: {
      date: dateToISO(new Date()),
      times: { start: null, end: null, breaks: [] },
      tips: { amount: null, pools: [] },
      wage: { startTime: null, endTime: null, hourlyRate: 6 },
      other: { entries: [] },
      team: { members: [], role: '', section: '', initialized: false },
      events: { items: [], shiftRating: null, busyLevel: null },
      chump: { played: null, didWin: null, amount: null, useDetailedAmount: false, coins: null, cash: null, playerCount: null, players: [], winnerName: '', notes: '' },
      notes: { text: '', mood: null, tags: [] }
    }
  }
};

// ─────────────────────────────────────────────
//  TIME PARSING ENGINE
// ─────────────────────────────────────────────
function parseTimeInput(raw) {
  if (!raw || !raw.trim()) return null;
  let s = raw.trim().toLowerCase().replace(/[:\s]/g, '');

  let forcedMeridiem = null;
  if (s.endsWith('am') || s.endsWith('a')) {
    forcedMeridiem = 'am';
    s = s.replace(/am$|a$/, '');
  } else if (s.endsWith('pm') || s.endsWith('p')) {
    forcedMeridiem = 'pm';
    s = s.replace(/pm$|p$/, '');
  }

  if (!/^\d{1,4}$/.test(s)) return null;

  const n = parseInt(s, 10);
  let h, m;

  if (s.length <= 2) {
    h = n; m = 0;
  } else if (s.length === 3) {
    h = parseInt(s[0], 10); m = parseInt(s.slice(1), 10);
  } else {
    h = parseInt(s.slice(0, 2), 10); m = parseInt(s.slice(2), 10);
  }

  if (m < 0 || m > 59) return null;
  if (h < 0 || h > 23) return null;

  const isMilitary = h >= 13;
  let resolvedH = h;
  let meridiem;

  if (isMilitary) {
    resolvedH = h;
    meridiem = 'pm';
  } else if (forcedMeridiem) {
    meridiem = forcedMeridiem;
    if (meridiem === 'pm' && h !== 12) resolvedH = h + 12;
    if (meridiem === 'am' && h === 12) resolvedH = 0;
  } else {
    if (h >= 9 && h <= 11) meridiem = 'am';
    else if (h === 12) meridiem = 'pm';
    else meridiem = 'pm';
    if (meridiem === 'pm' && h < 12) resolvedH = h + 12;
  }

  if (resolvedH > 23) return null;

  return { h: resolvedH, m, meridiem: isMilitary ? (h >= 12 ? 'pm' : 'am') : meridiem };
}

function parseEndTimeWithContext(raw, startH24) {
  if (!raw || !raw.trim()) return null;
  let s = raw.trim().toLowerCase().replace(/[:\s]/g, '');

  if (/[ap]m?$/.test(s)) return parseTimeInput(raw);

  const parsed = parseTimeInput(raw);
  if (!parsed) return null;

  const sMod = s.replace(/am$|a$|pm$|p$/, '');
  if (sMod.length === 4 && parseInt(sMod.slice(0,2)) >= 13) return parsed;
  if (sMod.length === 2 && parseInt(sMod) >= 13) return parsed;

  const rawH = parsed.h > 12 ? parsed.h - 12 : parsed.h;
  const m = parsed.m;

  const asAM = rawH === 12 ? 0 : rawH;
  const asPM = rawH === 12 ? 12 : rawH + 12;

  if (startH24 === null || startH24 === undefined) return parsed;

  const startMins = startH24 * 60;
  const amMins = asAM * 60 + m;
  const pmMins = asPM * 60 + m;

  const amDiff = amMins >= startMins ? amMins - startMins : amMins + 1440 - startMins;
  const pmDiff = pmMins >= startMins ? pmMins - startMins : pmMins + 1440 - startMins;

  let chosenH;
  if (amDiff <= pmDiff) chosenH = asAM;
  else chosenH = asPM;

  return { h: chosenH, m, meridiem: chosenH >= 12 ? 'pm' : 'am' };
}

function formatTime24(parsed) {
  if (!parsed) return null;
  return String(parsed.h).padStart(2,'0') + ':' + String(parsed.m).padStart(2,'0');
}

function formatTimeDisplay(time24) {
  if (!time24) return null;
  const [h, m] = time24.split(':').map(Number);
  const meridiem = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return h12 + (m > 0 ? ':' + String(m).padStart(2,'0') : '') + ' ' + meridiem;
}

function formatTimeEditValue(time24) {
  if (!time24) return '';
  const [h, m] = time24.split(':').map(Number);
  const meridiem = h >= 12 ? 'PM' : 'AM';

}

//  DATE PARSING ENGINE
// ─────────────────────────────────────────────
const MONTHS = ['january','february','march','april','may','june','july','august','september','october','november','december'];
const MONTH_SHORT = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

function parseDateInput(raw) {
  if (!raw || !raw.trim()) return null;
  const s = raw.trim().toLowerCase();

  const today = new Date();
  if (s === 'today' || s === 't') return today;
  if (s === 'yesterday' || s === 'y') { const d = new Date(today); d.setDate(d.getDate()-1); return d; }
  if (s === 'tomorrow') { const d = new Date(today); d.setDate(d.getDate()+1); return d; }

  const native = new Date(raw);
  if (!isNaN(native.getTime()) && raw.trim().length > 4) return native;

  const numericFull = s.replace(/[-\/\.]/g, '');
  if (/^\d{3,8}$/.test(numericFull)) {
    const n = numericFull;
    let mo, dy, yr = today.getFullYear();
    if (n.length === 3) { mo = parseInt(n[0]); dy = parseInt(n.slice(1)); }
    else if (n.length === 4) { mo = parseInt(n.slice(0,2)); dy = parseInt(n.slice(2)); }
    else if (n.length === 6) { mo = parseInt(n.slice(0,2)); dy = parseInt(n.slice(2,4)); yr = 2000 + parseInt(n.slice(4)); }
    else if (n.length === 8) { mo = parseInt(n.slice(0,2)); dy = parseInt(n.slice(2,4)); yr = parseInt(n.slice(4)); }
    if (mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
      const d = new Date(yr, mo-1, dy);
      if (!isNaN(d.getTime())) return d;
    }
  }

  for (let i = 0; i < 12; i++) {
    const mo = MONTHS[i];
    const ms = MONTH_SHORT[i];
    const pat1 = new RegExp(`(${mo}|${ms})\\s+(\\d{1,2})(st|nd|rd|th)?`);
    const pat2 = new RegExp(`(\\d{1,2})(st|nd|rd|th)?\\s+(${mo}|${ms})`);
    let m;
    if ((m = s.match(pat1))) { const d = new Date(today.getFullYear(), i, parseInt(m[2])); if (!isNaN(d.getTime())) return d; }
    if ((m = s.match(pat2))) { const d = new Date(today.getFullYear(), i, parseInt(m[1])); if (!isNaN(d.getTime())) return d; }
  }

  return null;
}

function formatDateDisplay(iso) {
  if (!iso) return null;
  const [yr, mo, dy] = iso.split('-').map(Number);
  const d = new Date(yr, mo-1, dy);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return { full: months[mo-1] + ' ' + dy + ', ' + yr, day: days[d.getDay()] };
}

function dateToISO(d) {
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${yr}-${mo}-${dy}`;
}

function previewDateInput(raw) {
  if (!raw || !raw.trim()) return { display: '', valid: null };
  const d = parseDateInput(raw);
  if (!d) return { display: 'Not recognized', valid: false };
  const fmt = formatDateDisplay(dateToISO(d));
  return { display: '→ ' + fmt.day + ', ' + fmt.full, valid: true };
}

// ─────────────────────────────────────────────
//  CALCULATIONS
// ─────────────────────────────────────────────
function calcDuration(start, end) {
  if (!start || !end) return null;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let d = (eh + em/60) - (sh + sm/60);
  if (d < 0) d += 24;
  if (d === 0) return null;
  return d;
}

function calcDurationDisplay(start, end) {
  const d = calcDuration(start, end);
  if (d === null) return '—';
  return d.toFixed(1);
}

function otherTotal(type = null) {
  return state.formData.shift.other.entries.reduce((sum, entry) => {
    if (type && entry.type !== type) return sum;
    return sum + (Number(entry.amount) || 0);
  }, 0);
}

function calcTotal() {
  const tips = state.formData.shift.tips.amount || 0;
  const w = state.formData.shift.wage;
  const start = w.startTime || state.formData.shift.times.start;
  const end = w.endTime || state.formData.shift.times.end;
  const dur = calcDuration(start, end) || 0;
  const wageEarnings = (w.hourlyRate || 0) * dur;
  return tips + wageEarnings + otherTotal();
}

function calcProgress() {
  let score = 0;
  if (state.formData.shift.date) score++;
  return Math.round((score / 1) * 100);
}

function poolTotal() {
  return state.formData.shift.tips.pools.reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
}

    return calcDuration(start, end) && shift.wage.hourlyRate ? statusPill('Active', 'live') : statusPill('Not logged');

function render(options = {}) {
  const fd = state.formData;
  if (state.activeSection === 'team') ensureTeamInitialized();
  const startT = fd.shift.times.start;
  const endT = fd.shift.times.end;
  const dur = calcDurationDisplay(startT, endT);
  const total = calcTotal();
  const pct = calcProgress();

  function navSub(id) {
    if (id === 'date') {
      const fmt = fd.shift.date ? formatDateDisplay(fd.shift.date) : null;
      return fmt ? `<div class="nav-sub">${fmt.full}</div>` : `<div class="nav-sub">Not set</div>`;
    }
    if (id === 'times') {
      const s = fd.shift.times.start ? formatTimeDisplay(fd.shift.times.start) : null;
      const e = fd.shift.times.end ? formatTimeDisplay(fd.shift.times.end) : null;
      if (s && e) return `<div class="nav-sub">${s} – ${e}</div>`;
      if (s) return `<div class="nav-sub">${s} – ?</div>`;
      return `<div class="nav-sub">Not set</div>`;
    }
    if (id === 'tips') {
      return fd.shift.tips.amount !== null
        ? `<div class="nav-sub emerald">$${fd.shift.tips.amount}</div>`
        : `<div class="nav-sub">Not logged</div>`;
    }
    if (id === 'wage') {
      const wStart = fd.shift.wage.startTime || startT;
      const wEnd = fd.shift.wage.endTime || endT;
      const d = calcDuration(wStart, wEnd);
      return d !== null && fd.shift.wage.hourlyRate
        ? `<div class="nav-sub emerald">$${(fd.shift.wage.hourlyRate * d).toFixed(2)}</div>`
        : `<div class="nav-sub">Not set</div>`;
    }
    if (id === 'other') {
      const total = otherTotal();
      return total ? `<div class="nav-sub emerald">${money(total)}</div>` : `<div class="nav-sub">Not logged</div>`;
    }
    if (id === 'chump') {
      if (fd.shift.chump.played === false) return `<div class="nav-sub">Not played</div>`;
      if (fd.shift.chump.played) return `<div class="nav-sub emerald">${fd.shift.chump.didWin === true ? 'Won' : fd.shift.chump.didWin === false ? 'Lost' : 'Played'}</div>`;
      return `<div class="nav-sub">Not logged</div>`;
    }
    return '';
  }

  function isCompleted(id) {
    if (id === 'date') return !!fd.shift.date;
    if (id === 'times') return !!(fd.shift.times.start || fd.shift.times.end);
    if (id === 'tips') return fd.shift.tips.amount !== null;
    if (id === 'wage') return !!(fd.shift.wage.hourlyRate);
    if (id === 'other') return fd.shift.other.entries.length > 0;
    if (id === 'chump') return fd.shift.chump.played !== null;
    return state.completedSections.includes(id);

function shortcutLabel(id) {
  const entry = Object.entries(sectionShortcuts).find(([, section]) => section === id);
  return entry ? entry[0].toUpperCase() : '';
}

function money(value) {
  return '$' + Number(value || 0).toFixed(2);
}

function renderHomeDashboard(dur, wageEarnings, wageDur, total) {
  const shift = state.formData.shift;
  const date = shift.date ? formatDateDisplay(shift.date) : null;
  const teamRows = shift.team.members.filter(m => !isEmptyTeamMember(m));
  const tips = shift.tips.amount || 0;
  const wageValue = wageEarnings ? Number(wageEarnings) : 0;
  const otherValue = otherTotal();
  const shiftHours = calcDuration(shift.times.start, shift.times.end);
  const totalHours = teamRows.reduce((sum, m) => sum + (calcDuration(m.startTime, m.endTime) || 0), 0);
  const tipsPerHour = shiftHours ? tips / shiftHours : 0;
  const recentSameDayTipsPerHour = 31.4;
  const lastShiftTipsPerHour = 28.75;
  const sameDayDelta = recentSameDayTipsPerHour ? ((tipsPerHour - recentSameDayTipsPerHour) / recentSameDayTipsPerHour) * 100 : 0;
  const lastShiftDelta = lastShiftTipsPerHour ? ((tipsPerHour - lastShiftTipsPerHour) / lastShiftTipsPerHour) * 100 : 0;
  const memberCountDelta = teamRows.length - 4;
  const totalHoursDelta = totalHours - 27.5;
  const partyTitle = shift.events.busyLevel ? `${busyLabels[shift.events.busyLevel - 1]} service` : 'Party details';
  const partySubtitle = shift.events.items.length
    ? shift.events.items.slice(0, 2).map(item => item.desc).filter(Boolean).join(' · ')
    : 'Add notable parties, rushes, comps, weather, and other context in Events.';
  const maxHours = Math.max(shiftHours || 0, wageDur || 0, totalHours || 0, 1);
  const bars = [
    { label: 'Shift', value: shiftHours || 0 },
    { label: 'Wage', value: wageDur || 0 },
    { label: 'Team', value: totalHours || 0 }
  ];
  return `
    <div class="animate-in">
      <div class="section-header">
        <div class="section-row">
          <h2 class="section-title">Shift Dashboard</h2>
          ${statusPill('Live', 'live')}
        </div>
      </div>
      <div class="card home-card">
        <div class="home-top">
          <div class="home-hero">
            <div>
              <div class="home-eyebrow">${date ? date.day : 'New shift'}</div>
              <div class="home-title">${date ? date.full : 'No date selected'}</div>
              <div class="home-subtitle">
                ${shift.times.start || shift.times.end
                  ? `${shift.times.start ? formatTimeDisplay(shift.times.start) : 'Start missing'} to ${shift.times.end ? formatTimeDisplay(shift.times.end) : 'end missing'}${shiftHours ? `, ${shiftHours.toFixed(1)} scheduled hours` : ''}.`
                  : 'Set your start and end time to unlock hourly comparisons and earnings pace.'}
              </div>
            </div>
            <div class="home-detail-row">
              <span class="detail-chip">${svg('clock',13)} ${shiftHours ? shiftHours.toFixed(1) + ' shift hrs' : 'Hours needed'}</span>
              <span class="detail-chip">${svg('money',13)} ${money(shift.wage.hourlyRate)}/hr</span>
              <span class="detail-chip">${svg('users',13)} ${teamRows.length || 0} bartenders</span>
              <span class="detail-chip">${svg('trend',13)} ${tipsPerHour ? money(tipsPerHour) + '/tip hr' : 'No tip pace yet'}</span>
            </div>
          </div>
          <div class="earnings-card">
            <div>
              <div class="dash-label">Total Earnings</div>
              <div class="earnings-total">${money(total)}</div>
            </div>
            <div class="earnings-breakdown">
              <div class="earnings-line"><span>Tips</span><strong>${money(tips)}</strong></div>
              <div class="earnings-line"><span>Wage</span><strong>${money(wageValue)}</strong></div>
              <div class="earnings-line"><span>Other</span><strong>${money(otherValue)}</strong></div>
              <div class="earnings-line"><span>Hourly rate</span><strong>${money(shift.wage.hourlyRate)}/hr</strong></div>
              <div class="earnings-line"><span>Tips per hour</span><strong>${tipsPerHour ? money(tipsPerHour) : '—'}</strong></div>
            </div>
          </div>
        </div>
        <div class="dash-grid">
          <div class="dash-panel">
            <div class="dash-label">Shift Hours</div>
            <div class="dash-value">${shiftHours ? shiftHours.toFixed(1) : '—'}</div>
            <div class="dash-note">${shift.times.start ? formatTimeDisplay(shift.times.start) : '—'} – ${shift.times.end ? formatTimeDisplay(shift.times.end) : '—'}</div>
          </div>
          <div class="dash-panel">
            <div class="dash-label">Wage Hours</div>
            <div class="dash-value">${wageDur ? wageDur.toFixed(1) : '—'}</div>
            <div class="dash-note">${wageEarnings ? `${money(wageValue)} at ${money(shift.wage.hourlyRate)}/hr` : 'Need hours and rate'}</div>
          </div>
          <div class="dash-panel">
            <div class="dash-label">Team Hours</div>
            <div class="dash-value">${totalHours ? totalHours.toFixed(1) : '—'}</div>
            <div class="dash-note">${totalHoursDelta >= 0 ? '+' : ''}${totalHoursDelta.toFixed(1)} vs recent global average</div>
          </div>
          <div class="dash-panel">
            <div class="dash-label">Bartenders</div>
            <div class="dash-value">${teamRows.length || '—'}</div>
            <div class="dash-note">${memberCountDelta >= 0 ? '+' : ''}${memberCountDelta} vs recent count</div>
          </div>
        </div>
        <div class="dashboard-band">
          <div class="dash-panel">
            <div class="dash-label">Bartenders</div>
            <div class="dash-list">
              ${teamRows.length ? teamRows.map((m, i) => {
                const hours = calcDuration(m.startTime, m.endTime);
                return `<div class="dash-row">
                  <span class="dash-person">${personChip(m.name, i, true)} <span class="dash-person-name">${m.name || '—'}</span>${m.isUser ? `<span class="team-user-badge" title="You">${svg('crown',13)}</span>` : ''}${locationPill(m.location)}</span>
                  <span>${hours !== null ? hours.toFixed(1) + ' hrs' : '—'}</span>
                </div>`;
              }).join('') : `<div class="dash-row"><span>No bartenders logged</span><span>—</span></div>`}
            </div>
            <div class="team-total-row"><span>Total team hours</span><span>${totalHours ? totalHours.toFixed(1) : '—'}</span></div>
          </div>
          <div class="compare-card">
            <div class="dash-label">${partyTitle}</div>
            <div class="dash-value" style="font-size:1rem;margin-bottom:6px;">Important details</div>
            <div class="dash-note">${partySubtitle || 'No additional details logged yet.'}</div>
            <div class="mini-bars">
              ${bars.map(bar => `<div class="mini-bar" title="${bar.label}: ${bar.value.toFixed(1)} hrs" style="height:${Math.max(10, (bar.value / maxHours) * 76)}px"></div>`).join('')}
            </div>
            <div class="earnings-line" style="margin-top:8px;">${bars.map(bar => `<span>${bar.label} ${bar.value ? bar.value.toFixed(1) : '—'}</span>`).join('')}</div>
          </div>
        </div>
        <div class="dashboard-band">
          <div class="compare-card">
            <div class="dash-label">Tips/hour vs same weekday</div>
            <div class="compare-main">
              <div class="compare-value">${tipsPerHour ? money(tipsPerHour) : '—'}</div>
              <div class="compare-delta ${sameDayDelta >= 0 ? 'up' : 'down'}">${tipsPerHour ? `${sameDayDelta >= 0 ? '+' : ''}${sameDayDelta.toFixed(0)}%` : '—'}</div>
            </div>
            <div class="dash-note">Recent ${date ? date.day : 'same-day'} benchmark: ${money(recentSameDayTipsPerHour)}/hr.</div>
          </div>
          <div class="compare-card">
            <div class="dash-label">Tips/hour vs last shift</div>
            <div class="compare-main">
              <div class="compare-value">${tipsPerHour ? money(tipsPerHour) : '—'}</div>
              <div class="compare-delta ${lastShiftDelta >= 0 ? 'up' : 'down'}">${tipsPerHour ? `${lastShiftDelta >= 0 ? '+' : ''}${lastShiftDelta.toFixed(0)}%` : '—'}</div>
            </div>
            <div class="dash-note">Last logged shift pace: ${money(lastShiftTipsPerHour)}/hr.</div>
          </div>
        </div>
      </div>
    </div>`;
}

                  <h4>Use your typical Friday pattern?</h4>
                  <span class="badge badge-blue">Recommended</span>
                </div>
                <p class="suggest-p">Based on your last 8 Friday shifts, you typically work 5:00 PM – 1:00 AM (8 hours)</p>
                <div class="suggest-btns">
                  <button class="btn btn-ghost-blue" onclick="applyPattern()">Apply Times</button>
                  <button class="btn btn-text">Dismiss</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-nav" style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="prevSection()">${svg('chevL')} Previous</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextSection()">Next: Tips ${svg('chevR')}</button>
      </div>
    </div>`;
